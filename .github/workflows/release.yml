name: Release

# Builds the Windows installer and portable exe and publishes them as a GitHub
# Release whenever the version in package.json changes on main. Safe to run on
# every push: it no-ops if a release for the current version already exists.
# Can also be triggered manually to (re)build and publish the current version.
on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "build/**"
      - "package.json"
      - "electron-builder.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from package.json
        id: version
        shell: pwsh
        run: |
          $ver = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if (-not $ver) {
            Write-Error "Could not read version from package.json"
            exit 1
          }
          Write-Host "Version: $ver"
          "version=$ver" >> $env:GITHUB_OUTPUT
          "tag=v$ver" >> $env:GITHUB_OUTPUT

      - name: Skip if this version was already released
        id: check
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ steps.version.outputs.tag }}" *> $null
          if ($LASTEXITCODE -eq 0) {
            Write-Host "Release ${{ steps.version.outputs.tag }} already exists, skipping."
            "skip=true" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "No release yet for ${{ steps.version.outputs.tag }} - will create one."
            "skip=false" >> $env:GITHUB_OUTPUT
          }
          # pwsh steps exit with the last-seen $LASTEXITCODE, which `gh release view`
          # deliberately left non-zero above (that's how we detect "no release yet") -
          # without this the step itself would be reported as failed.
          exit 0

      - name: Setup Node
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # npm 11 does not run install scripts without explicit approval. The
      # approvals live in the allowScripts field of package.json - without them
      # Electron never downloads its binary and the build fails.
      - name: Install dependencies
        if: steps.check.outputs.skip == 'false'
        run: npm ci

      - name: Typecheck
        if: steps.check.outputs.skip == 'false'
        run: npm run typecheck

      # CI already ran these on the merge, but a release is also triggered by
      # hand via workflow_dispatch — a broken build must not reach a tag.
      - name: Test
        if: steps.check.outputs.skip == 'false'
        run: npm test

      - name: Build
        if: steps.check.outputs.skip == 'false'
        run: npx electron-vite build

      # --publish never: the release is created by gh below, so electron-builder
      # only has to produce the files. Left to itself it would upload them to a
      # draft release, which never becomes visible.
      - name: Package
        if: steps.check.outputs.skip == 'false'
        run: npx electron-builder --win --publish never

      - name: Create tag and GitHub Release
        if: steps.check.outputs.skip == 'false'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $setup = "release/A-Player-${{ steps.version.outputs.version }}-setup.exe"
          $portable = "release/A-Player-${{ steps.version.outputs.version }}-portable.exe"
          foreach ($f in @($setup, $portable)) {
            if (-not (Test-Path $f)) {
              Write-Error "Expected artifact not found: $f"
              exit 1
            }
          }
          gh release create "${{ steps.version.outputs.tag }}" $setup $portable `
            --title "${{ steps.version.outputs.tag }}" `
            --generate-notes
