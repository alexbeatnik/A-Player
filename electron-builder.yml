appId: com.alexbeatnik.a-player
productName: A-Player
copyright: Copyright © 2026 Oleksii Poliakov

directories:
  buildResources: build
  output: release

files:
  - out/**/*
  - package.json

asar: true

win:
  icon: build/icon.ico
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  # The player writes nothing outside its own folders — admin rights are unnecessary.
  requestedExecutionLevel: asInvoker

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: A-Player
  artifactName: A-Player-${version}-setup.${ext}
  uninstallDisplayName: A-Player

portable:
  artifactName: A-Player-${version}-portable.${ext}

# Double-clicking a track opens it in the player; the main process reads the
# paths from argv and forwards them to the renderer.
fileAssociations:
  - ext: mp3
    name: MP3 Audio
    role: Viewer
  - ext: flac
    name: FLAC Audio
    role: Viewer
  - ext: wav
    name: WAV Audio
    role: Viewer
  - ext: ogg
    name: Ogg Audio
    role: Viewer
  - ext: opus
    name: Opus Audio
    role: Viewer
  - ext: m4a
    name: MPEG-4 Audio
    role: Viewer
  - ext: aac
    name: AAC Audio
    role: Viewer

# No publish provider on purpose: the release is created by `gh release create`
# in .github/workflows/release.yml. electron-builder's own publisher uploads to
# a draft release, which is easy to mistake for "nothing was released".
publish: null
